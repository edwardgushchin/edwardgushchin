<svg width="360" height="210" viewBox="0 0 360 210" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Eduard Gushchin's GitHub Statistics</title>
  <desc id="desc">GitHub statistics card with stars, forks, contributions, changed lines, repository views, and repositories with contributions.</desc>
  <style>
    .title { fill: #58a6ff; font: 600 14px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .label { fill: #8b949e; font: 600 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .value { fill: #8b949e; font: 12px -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif; }
    .icon { fill: #8b949e; font: 14px -apple-system, BlinkMacSystemFont, "Segoe UI Symbol", "Apple Color Emoji", sans-serif; }
  </style>
  <rect x="5.5" y="5.5" width="349" height="199" rx="6" fill="transparent" stroke="#30363d"/>
  <text class="title" x="38" y="38">Eduard Gushchin's GitHub Statistics</text>
  <g transform="translate(38 63)">
    <text class="icon" x="0" y="0">☆</text>
    <text class="label" x="22" y="0">Stars</text>
    <text class="value" x="242" y="0" text-anchor="end">252</text>
  </g>
  <g transform="translate(38 85)">
    <text class="icon" x="0" y="0">⑂</text>
    <text class="label" x="22" y="0">Forks</text>
    <text class="value" x="242" y="0" text-anchor="end">31</text>
  </g>
  <g transform="translate(38 107)">
    <text class="icon" x="0" y="0">↥</text>
    <text class="label" x="22" y="0">All-time contributions</text>
    <text class="value" x="242" y="0" text-anchor="end">1,646</text>
  </g>
  <g transform="translate(38 129)">
    <text class="icon" x="0" y="0">±</text>
    <text class="label" x="22" y="0">Lines of code changed</text>
    <text class="value" x="242" y="0" text-anchor="end">2,418,878</text>
  </g>
  <g transform="translate(38 151)">
    <text class="icon" x="0" y="0">◉</text>
    <text class="label" x="22" y="0">Repository views (past two weeks)</text>
    <text class="value" x="242" y="0" text-anchor="end">1,687</text>
  </g>
  <g transform="translate(38 173)">
    <text class="icon" x="0" y="0">▤</text>
    <text class="label" x="22" y="0">Repositories with contributions</text>
    <text class="value" x="242" y="0" text-anchor="end">7</text>
  </g>
</svg>
